<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library - ipLaY</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="library.css" />
        <!-- Standard favicon -->
<link rel="icon" type="image/png" href="iplay_icon.png">

<!-- Apple devices (iPhone/iPad) -->
<link rel="apple-touch-icon" href="iplay_icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="manifest.json">
</head>

<body>

    <!-- HEADER -->
    <header>
        <h2 class="logo">ipLaY</h2>

        <nav>
            <li><a href="index.html">Home</a></li>
            <li><a href="library.html">Library</a></li>
            <li><a href="favourites.html">Favourite</a></li>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- TITLE -->
        <div class="container">
            <h3>
                Welcome to <span class="logo">ipLaY</span> App
            </h3>

            <p>
                Discover and enjoy your favorite music..
            </p>
        </div>

        <div class="playlist-container" id="playlist-container">
            <!-- Playlist items will be dynamically added here -->
        </div>

        <!-- MUSIC LIST -->
        <div class="music-list" id="music-list"></div>

    </main>

    <!-- AUDIO PLAYER -->
    <div id="audio-player" class="audio-player">
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" min="0" max="100" />
            <span id="duration">0:00</span>
        </div>
        <div id="current-song" class="current-song">
            No song playing
        </div>
        <br>
        <button id="prev-btn" class="control-btn" onclick="songDec()">⏮</button>
        <button id="play-btn" class="control-btn" onclick="songPlay()">▶</button>
        <button id="next-btn" class="control-btn" onclick="songInc()">⏭</button>
    </div>

    <!-- SCRIPT -->
    <script src="library.js"></script>
    <script src="controls.js"></script>

</body>

</html>
