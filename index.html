<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ipLaY App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Standard favicon -->
<link rel="icon" type="image/png" href="iplay_icon.png">

<!-- Apple devices (iPhone/iPad) -->
<link rel="apple-touch-icon" href="iplay_icon.png">

<!-- Android / PWA -->
<link rel="manifest" href="manifest.json">
</head>

<body>
    <header>
        <a href="index.html" class="logo">ipLaY</a>
        <nav>
            <li><a href="index.html">Home</a></li>
            <li><a href="library.html">Library</a></li>
            <li><a href="favourites.html">Favourite</a></li>
        </nav>
    </header>
    <div id="main" class="main">
        <search class="search-bar">
            <input id="search-input" type="text" placeholder="Search for songs...">
            <button class="search-btn">Search</button>
        </search>
        <div class="container">
            <h3>Welcome to <span class="logo">ipLaY</span> App</h3>
            <p>Discover and enjoy your favorite music..</p>
        </div>
        <div class="music-list" id="music-list"></div>
    </div>
    <div control id="audio-player" class="audio-player">
        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" min="0" max="100">
            <span id="duration">0:00</span>
        </div>
        <div id="current-song" class="current-song">
            No song playing
        </div><br>
        <button id="prev-btn" class="control-btn" onclick="songDec()">⏮</button>
        <button id="play-btn" class="control-btn" onclick="songPlay()">▶</button>
        <button id="next-btn" class="control-btn" onclick="songInc()">⏭</button>
    </div>

    <script src="index.js"></script>
    <script src="controls.js"></script>
</body>

</html>
